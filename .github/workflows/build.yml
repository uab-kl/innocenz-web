name: Build Image

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: innocenz-frontend
      DOCKERHUB_NAMESPACE: juneyou

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          REF_NAME="${GITHUB_REF_NAME:-}"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          IMAGE="${DOCKERHUB_NAMESPACE}/${PROJECT_NAME}"

          if [ "$REF_NAME" = "staging" ]; then
            VERSION="0.0.0-${SHORT_SHA}-staging"
            TAGS="${IMAGE}:staging-${SHORT_SHA},${IMAGE}:staging-latest"
          else
            VERSION="0.0.0-${SHORT_SHA}"
            TAGS="${IMAGE}:${SHORT_SHA},${IMAGE}:latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Select staging build env
        if: ${{ github.ref_name == 'staging' || contains(steps.meta.outputs.version, '-staging') }}
        shell: bash
        env:
          VITE_API_URL_STAG: ${{ secrets.VITE_API_URL_STAG }}
          VITE_GRAPHQL_ENDPOINT_STAG: ${{ secrets.VITE_GRAPHQL_ENDPOINT_STAG }}
        run: |
          set -euo pipefail
          echo "VITE_API_URL=${VITE_API_URL_STAG}" >> "$GITHUB_ENV"
          echo "VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT_STAG}" >> "$GITHUB_ENV"

      - name: Select production build env
        if: ${{ github.ref_name == 'main' && !contains(steps.meta.outputs.version, '-staging') }}
        shell: bash
        env:
          VITE_API_URL_PROD: ${{ secrets.VITE_API_URL_PROD }}
          VITE_GRAPHQL_ENDPOINT_PROD: ${{ secrets.VITE_GRAPHQL_ENDPOINT_PROD }}
        run: |
          set -euo pipefail
          echo "VITE_API_URL=${VITE_API_URL_PROD}" >> "$GITHUB_ENV"
          echo "VITE_GRAPHQL_ENDPOINT=${VITE_GRAPHQL_ENDPOINT_PROD}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_GRAPHQL_ENDPOINT=${{ env.VITE_GRAPHQL_ENDPOINT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
